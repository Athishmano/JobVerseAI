[pytest]
# pytest-asyncio: auto mode so every async test function is wrapped automatically
# without needing @pytest.mark.asyncio on each one
asyncio_mode = auto

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks in normal output; full on -v
addopts = --tb=short

# Suppress warnings from third-party libraries during test runs
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:google.*
    ignore::DeprecationWarning:playwright.*
